# Hand-curated names eligible mainly for the Aggressive sleeve.
# Edit freely. Note `rationale` — keep it short so it's useful in screens.
curated_small_first_north:
  - {ticker: LYKO-A.ST,   name: "Lyko Group A",            sector: "E-commerce/Beauty", rationale: "Nordic online beauty leader, taking share from physical retail."}
  - {ticker: KAMBI.ST,    name: "Kambi Group",             sector: "Gaming/B2B",        rationale: "B2B sports betting tech, asset-light, exposure to US legalization."}
  - {ticker: BETCO.ST,    name: "Betsson",                 sector: "Gaming",            rationale: "Profitable iGaming operator, dividend, ex-Sweden license diversification."}
  - {ticker: VIMIAN.ST,   name: "Vimian Group",            sector: "Healthcare/Pets",   rationale: "Veterinary medtech roll-up, founder-aligned, recurring revenue."}
  - {ticker: NOTE.ST,     name: "NOTE",                    sector: "Industrials",       rationale: "EMS contract manufacturer, defense and industrial exposure, strong order book."}
  - {ticker: MILDEF.ST,   name: "MilDef Group",            sector: "Defense",           rationale: "Rugged IT for defense customers, structural Nordic defense spending uplift."}
  - {ticker: NIVI-B.ST,   name: "Nivika Fastigheter B",    sector: "Real Estate",       rationale: "Growing regional property owner, founder-led, conservative balance sheet."}
  - {ticker: EMBRAC-B.ST, name: "Embracer Group B",        sector: "Gaming",            rationale: "Restructuring video game holding, deep value if the split-up plays out."}
  - {ticker: DOXA.ST,     name: "Doxa",                    sector: "Real Estate",       rationale: "Recent significant insider buying. Worth periodic look."}
  - {ticker: STAR-B.ST,   name: "Starbreeze B",            sector: "Gaming",            rationale: "Speculative — Payday 3 turnaround. Aggressive sleeve only if thesis sharpens."}
  - {ticker: CDON.ST,     name: "CDON Group",              sector: "E-commerce",        rationale: "Nordic marketplace turnaround under new management. Speculative."}
  - {ticker: CIBUS.ST,    name: "Cibus Nordic Real Estate",sector: "Real Estate",       rationale: "Daily-goods anchored grocery property REIT, monthly dividend, defensive."}
  - {ticker: NCAB.ST,     name: "NCAB Group",              sector: "Industrials",       rationale: "PCB design/distribution, asset-light, global growth, capital-efficient."}

# US equities (priced in USD; valued/executed in SEK at the live FX rate).
# v2: widened from ~23 mega-caps to a broad LIQUID set across sectors and the
# size spectrum (large + liquid mid/growth). Börsdata's global instrument list
# has no size/volume field, so a fully-automatic "whole US market" pull can't be
# bounded before fetching — instead this is a wide hand-picked liquid universe,
# and a dollar-turnover liquidity floor (see metrics.avg_turnover_30d) trims any
# illiquid names at scan time. No US insider signal yet (SEC EDGAR Form 4 is a
# planned follow-up) — these trade on fundamentals + news only. Yahoo tickers
# have no exchange suffix.
us_large_cap:
