# Manual overrides for matching FI issuer names to our universe tickers.
#
# The auto-matcher in src/issuer_match.py handles most cases by normalizing both
# sides (stripping "AB", "Aktiebolag", "(publ)", share-class suffixes, etc.) and
# checking for a token-subsequence match. Use this file only for cases the
# auto-matcher misses.
#
# Format: TICKER -> list of substrings; if any substring appears in the FI
# issuer name (case-insensitive), the transactions are associated with this
# ticker.

