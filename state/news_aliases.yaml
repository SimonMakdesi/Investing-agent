# Override the default Google News search query for tickers where the
# company name produces too many false positives or misses the right entity.
#
# Each entry: ticker -> Google News search query (will be URL-encoded).
# Use double-quotes inside to anchor matches. OR-joins broaden the search.
#
# If a ticker isn't listed here, the default query is the entry's `name`
# in double quotes.

