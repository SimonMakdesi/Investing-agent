name: Weekly cycle

# Sunday 17:00 UTC = 18:00 winter / 19:00 summer in Stockholm.
# Phase 3 may revisit (e.g. run twice / use a job-internal time check).
on:
  schedule:
    - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - dry-run
          - live
        default: dry-run

permissions:
  contents: write  # for committing state/ updates back to the repo

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run weekly cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BORSDATA_API_KEY: ${{ secrets.BORSDATA_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          # Scheduled runs (no inputs) default to live.
          # Manual workflow_dispatch defaults to dry-run for safety.
          MODE="${{ github.event.inputs.mode || 'live' }}"
          echo "Running pipeline in $MODE mode"
          if [ "$MODE" = "live" ]; then
            uv run python -m src.pipeline_weekly --live
          else
            uv run python -m src.pipeline_weekly --dry-run
          fi

      - name: Commit state updates (live runs only)
        if: ${{ success() && (github.event.inputs.mode == 'live' || github.event_name == 'schedule') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ reports/ archive/ docs/ || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Weekly cycle $(date -u +%Y-%m-%d)"
            git push
          fi
