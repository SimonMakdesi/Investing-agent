name: Daily cycle

# Weekdays at 22:00 UTC — AFTER the US market close (20:00 UTC summer /
# 21:00 UTC winter), so both Stockholm and US get same-day final closes.
# v2: the daily cycle trades on conviction every weekday (Scout -> Analyst -> Trader).
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run daily cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BORSDATA_API_KEY: ${{ secrets.BORSDATA_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          # v2: daily cycle trades on conviction (Scout -> Analyst -> Trader)
          # and mutates state/. Use --dry-run to preview without changing state.
          uv run python -m src.pipeline_daily

      - name: Commit daily artifacts
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # state/ MUST be staged — the daily cycle now executes trades.
          git add state/ reports/ archive/ docs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily cycle $(date -u +%Y-%m-%d)"
            git push
          fi
