name: Daily light cycle

# Weekdays at 17:00 UTC (~18:00 / 19:00 Europe/Stockholm depending on DST).
on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run daily cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BORSDATA_API_KEY: ${{ secrets.BORSDATA_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          # Always emits the daily pulse + regenerates the dashboard.
          # Add --silent to revert to the old "only email on flags" behaviour.
          uv run python -m src.pipeline_daily

      - name: Commit daily artifacts
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ archive/ docs/ || true
          if git diff --cached --quiet; then
            echo "No daily artifacts changed."
          else
            git commit -m "Daily pulse $(date -u +%Y-%m-%d)"
            git push
          fi
